<div class="rounded-lg p-4 mb-4 {% if level == 'error' %}bg-red-50 border border-red-200 text-red-700{% elif level == 'warning' %}bg-amber-50 border border-amber-200 text-amber-700{% else %}bg-blue-50 border border-blue-200 text-blue-700{% endif %}"
     role="alert">
    <div class="flex items-center space-x-2">
        <span>{% if level == 'error' %}❌{% elif level == 'warning' %}⚠️{% else %}ℹ️{% endif %}</span>
        <p class="font-medium">{{ message }}</p>
    </div>
</div>

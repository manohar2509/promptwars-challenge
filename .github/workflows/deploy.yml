name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  SERVICE_NAME: travel-engine
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/travel-engine

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --tb=short -q

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation (recommended)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          # Option A (recommended): Workload Identity Federation — no long-lived key needed
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          # Option B (fallback): Service Account JSON key — comment out the three lines
          # above and uncomment the line below if you are not using WIF.
          # credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use gcloud as credential helper
        run: gcloud auth configure-docker --quiet

      - name: Build Docker image
        run: |
          docker build \
            --tag "$IMAGE:${{ github.sha }}" \
            --tag "$IMAGE:latest" \
            .

      - name: Push Docker image
        run: |
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --image "$IMAGE:${{ github.sha }}" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --allow-unauthenticated \
            --memory 512Mi \
            --max-instances 3 \
            --set-env-vars "ENVIRONMENT=production" \
            --set-secrets "GEMINI_API_KEY=gemini-api-key:latest,GOOGLE_MAPS_API_KEY=google-maps-api-key:latest"

      - name: Show deployed service URL
        run: |
          gcloud run services describe "$SERVICE_NAME" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --format "value(status.url)"
